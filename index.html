<!DOCTYPE html>
<html lang="tm">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üç Dogan Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .uc-glow:hover { box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-100 min-h-screen flex flex-col justify-between selection:bg-yellow-500 selection:text-black">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <span class="text-xl font-extrabold tracking-wider text-yellow-500">
                <i class="fa-solid fa-gamepad mr-2"></i>ÜÇ DOGAN <span class="text-white">STORE</span>
            </span>
            <div class="flex items-center space-x-2 bg-yellow-500/10 border border-yellow-500/20 px-3 py-1 rounded-full text-xs font-semibold text-yellow-500">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-1"></span>Hamanchik Hyzmatdaşy
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-6 w-full flex-grow">
        
        <!-- Step 1: ID Input -->
        <section class="mb-6 bg-gray-900/50 border border-gray-800 rounded-2xl p-5">
            <h2 class="text-lg font-bold mb-3 text-yellow-400 flex items-center">
                <span class="bg-yellow-500 text-black px-2 py-0.5 rounded mr-2 text-xs">1</span> PUBG Player ID Giriziň
            </h2>
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="playerId" placeholder="Mysaly: 512345678" 
                    class="flex-grow p-3 bg-black/40 border border-gray-700 rounded-xl focus:border-yellow-500 focus:outline-none text-white tracking-widest placeholder-gray-500 transition-all">
                <button id="verifyBtn" class="px-6 py-3 bg-yellow-500 hover:bg-yellow-400 text-black font-bold rounded-xl transition-all flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>ID Barla</span>
                </button>
            </div>
            <div id="verifyStatus" class="mt-2.5 text-xs font-semibold text-green-500 hidden flex items-center"></div>
        </section>

        <!-- Step 2: UC Grid -->
        <section class="mb-6">
            <h2 class="text-lg font-bold mb-4 text-yellow-400 flex items-center">
                <span class="bg-yellow-500 text-black px-2 py-0.5 rounded mr-2 text-xs">2</span> UC Paketini Saýlaň
            </h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="ucGrid"></div>
        </section>

    </main>

    <!-- Footer (Baýlaşdyrylan Bölüm) -->
    <footer class="bg-gray-950 border-t border-gray-800 py-8 mt-10">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <!-- Security & Speed Badge -->
            <div class="flex flex-wrap justify-center items-center gap-6 mb-6 text-xs text-gray-400">
                <span class="flex items-center"><i class="fa-solid fa-shield-halved text-green-500 mr-1.5 text-sm"></i> 100% Ygtybarly we Goralan Töleg</span>
                <span class="flex items-center"><i class="fa-solid fa-bolt text-yellow-500 mr-1.5 text-sm"></i> Dessine we Tiz Ugradylşyk</span>
            </div>
            <hr class="border-gray-900 my-4 max-w-sm mx-auto">
            <p class="text-xs text-gray-500 font-semibold tracking-wider">© 2026 ÜÇ DOGAN STORE - ÄHLI HUKUKLAR GORALAN</p>
            <p class="text-[10px] text-gray-600 mt-1">Midasbuy we PUBG Mobile bilen resmi hyzmatdaşlykda işlenilýär.</p>
        </div>
    </footer>

    <!-- HUSUSY BILDIRIŞ MODALY (GitHub Linkini Gizleýän Ýer) -->
    <div id="alertModal" class="fixed inset-0 flex items-center justify-center bg-black/80 hidden z-50 p-4 backdrop-blur-sm">
        <div class="bg-gray-900 border border-yellow-500/30 rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl shadow-yellow-500/5 animate-fade-in">
            <div class="w-12 h-12 bg-yellow-500/10 text-yellow-500 rounded-full flex items-center justify-center text-xl mx-auto mb-4">
                <i class="fa-solid fa-circle-exclamation"></i>
            </div>
            <p id="alertMessage" class="text-white text-sm mb-6 font-semibold leading-relaxed"></p>
            <button id="closeAlertBtn" class="w-full py-2.5 bg-yellow-500 hover:bg-yellow-400 text-black font-bold rounded-xl transition">OK</button>
        </div>
    </div>

    <!-- JS Code -->
    <script>
        const ucPackages = [
            { uc: 60, price: 51.99 },
            { uc: 300, bonus: 25, price: 219.99 },
            { uc: 600, bonus: 60, price: 429.99 },
            { uc: 1500, bonus: 300, price: 1059.99 },
            { uc: 3000, bonus: 850, price: 2109.99 },
            { uc: 6000, bonus: 2100, price: 4209.99 },
            { uc: 12000, bonus: 4200, price: 8409.99 }
        ];

        let isIdVerified = false;
        const grid = document.getElementById('ucGrid');

        // Custom Alert Function
        function myAlert(msg) {
            document.getElementById('alertMessage').innerText = msg;
            document.getElementById('alertModal').classList.remove('hidden');
        }

        document.getElementById('closeAlertBtn').onclick = () => {
            document.getElementById('alertModal').classList.add('hidden');
        };

        // Verify ID
        document.getElementById('verifyBtn').onclick = () => {
            const idInput = document.getElementById('playerId').value.trim();
            if (!idInput) return myAlert("Sargyt etmek üçin ilki bilen Player ID girizmeli!");
            
            isIdVerified = true;
            const statusDiv = document.getElementById('verifyStatus');
            statusDiv.innerHTML = `<i class="fa-solid fa-circle-check mr-1.5"></i> Hamanchik Hyzmatdaşy Tassyklandy! ✅`;
            statusDiv.classList.remove('hidden');
        };

        // Render Cards
        ucPackages.forEach(pkg => {
            const bonus = pkg.bonus ? `+${pkg.bonus}` : '';
            const card = document.createElement('div');
            card.className = "bg-gray-900/60 border border-gray-800 rounded-2xl p-4 flex flex-col justify-between items-center text-center cursor-pointer hover:border-yellow-500/50 transition-all uc-glow";
            card.innerHTML = `
                <div class="w-12 h-12 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-xl flex items-center justify-center text-black font-extrabold text-lg shadow-lg shadow-yellow-500/10 mb-2">UC</div>
                <div class="text-base font-bold text-white">${pkg.uc} <span class="text-yellow-400">${bonus}</span></div>
                <div class="text-sm font-bold text-yellow-500 mt-2">${pkg.price.toFixed(2)} TL</div>
            `;
            
            card.onclick = () => {
                const idInput = document.getElementById('playerId').value.trim();
                if (!idInput) return myAlert("Sargyt etmek üçin ilki bilen Player ID girizmeli!");
                if (!isIdVerified) return myAlert("Sargyt etmezden öň girizilen ID belgiňizi 'ID Barla' düwmesi bilen tassyklamaly!");

                const text = `Salam Hamanchik Hyzmatdaşy, men PUBG UC satyn almak isleýän!\n\n` + 
                             `👤 Player ID: ${idInput}\n` + 
                             `💎 Paket: ${pkg.uc} ${pkg.bonus ? '+ ' + pkg.bonus : ''} UC\n` + 
                             `💰 Jemi Töleg: ${pkg.price.toFixed(2)} TL`;
                window.open(`https://wa.me/905016873001?text=${encodeURIComponent(text)}`, '_blank');
            };
            grid.appendChild(card);
        });

        document.getElementById('playerId').oninput = () => {
            isIdVerified = false;
            document.getElementById('verifyStatus').classList.add('hidden');
        };
    </script>
</body>
</html>
